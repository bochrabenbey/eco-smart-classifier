version: "3.9"

services:
  api:
    build: .
    container_name: eco-smart-api
    ports:
      - "8000:8000"
    volumes:
      - ./data/processed:/app/data/processed:ro
      - ./data/reports:/app/data/reports
    environment:
      - PROCESSED_DIR=/app/data/processed
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    restart: unless-stopped
    networks:
      - eco-smart-net

  mlflow:
    image: python:3.11-slim
    container_name: eco-smart-mlflow
    command: >
      bash -c "pip install mlflow -q &&
               mlflow server --host 0.0.0.0 --port 5000
               --backend-store-uri sqlite:///mlruns/mlflow.db
               --default-artifact-root ./mlruns/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    networks:
      - eco-smart-net
    restart: unless-stopped

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: eco-smart-app
    ports:
      - "8501:8501"
    volumes:
      - ./data/processed:/app/data/processed:ro
    depends_on:
      - api
    networks:
      - eco-smart-net
    restart: unless-stopped

networks:
  eco-smart-net:
    driver: bridge

volumes:
  mlruns:
