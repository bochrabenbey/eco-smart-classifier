name: CI/CD — Eco-Smart Classifier

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  MIN_COVERAGE: 70

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (black · flake8 · isort)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install linting tools
        run: pip install black flake8 isort

      - name: black — format check
        run: black --check --diff src/ tests/

      - name: isort — import order
        run: isort --check-only --diff src/ tests/

      - name: flake8 — style lint
        run: flake8 src/ tests/ --max-line-length=100 --exclude=__pycache__

  # ── Tests & Coverage ──────────────────────────────────────────────────────
  test:
    name: Tests & Coverage ≥ ${{ env.MIN_COVERAGE }}%
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download NLTK resources
        run: |
          python -c "
          import nltk
          for r in ['punkt','stopwords','wordnet','punkt_tab','omw-1.4']:
              nltk.download(r, quiet=True)
          "

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.MIN_COVERAGE }}

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

      - name: Coverage badge
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── Docker Build ──────────────────────────────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/eco-smart-api:latest
            ghcr.io/${{ github.repository }}/eco-smart-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Streamlit image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.streamlit
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/eco-smart-app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
