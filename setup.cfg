[tool:pytest]
testpaths = tests
addopts = -v --tb=short

[coverage:run]
source = src
omit =
    src/app/*
    src/models/train_*.py
    src/models/clustering.py
    src/nlp/train_nlp.py
    src/monitoring/*

[coverage:report]
exclude_lines =
    pragma: no cover
    if __name__ == .__main__.:

[flake8]
max-line-length = 100
exclude = __pycache__, .git, data, mlruns, htmlcov
per-file-ignores =
    tests/*: E501

[isort]
profile = black
line_length = 100

[black]
line-length = 100
target-version = ['py311']
